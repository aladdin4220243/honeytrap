[channel.ingestion]
type = "webhook"
url = "https://ingestion-production-714d.up.railway.app/ingest/honeytrap"
method = "POST"
headers = { "Content-Type" = "application/json" }

[[filter]]
type = "events"
channel = ["ingestion"]

[service.ssh-simulator]
type = "ssh-simulator"
credentials = ["root:root", "admin:admin"]

[[port]]

ports = ["tcp/8022"]
services = ["ssh-simulator"]

[[logging]]
output = "stdout"
level = "debug"
